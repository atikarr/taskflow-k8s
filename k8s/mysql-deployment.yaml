apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-mysql
  namespace: taskflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskflow-mysql
  template:
    metadata:
      labels:
        app: taskflow-mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: taskflow-secret
              key: mysql-root-password
        - name: MYSQL_DATABASE
          value: "taskflow"
        - name: MYSQL_USER
          value: "taskflow"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: taskflow-secret
              key: mysql-password
        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        readinessProbe:
          exec:
            command: ["mysqladmin", "ping", "-h", "localhost"]
          initialDelaySeconds: 20
          periodSeconds: 10
      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: mysql-pvc
