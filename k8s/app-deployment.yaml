apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-app
  namespace: taskflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: taskflow-app
  template:
    metadata:
      labels:
        app: taskflow-app
    spec:
      containers:
      - name: taskflow-app
        image: taskflow-k8s:latest
        imagePullPolicy: Never        # pakai image lokal Minikube
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: taskflow-config
        env:
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: taskflow-secret
              key: mysql-password
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: taskflow-secret
              key: secret-key
        - name: TELEGRAM_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: taskflow-secret
              key: telegram-bot-token
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        resources:
          requests:
            cpu: "100m"               # wajib untuk HPA
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 15
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: uploads-pvc
